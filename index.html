<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>吉吉 · 青马刷题</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="吉吉刷题">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230f172a'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='white'%3E📚%3C/text%3E%3C/svg%3E">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #eef2ff 0%, #e0e7ff 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 16px;
        }

        .app-container {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            gap: 20px;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        /* 侧边栏样式 - 电脑/平板默认显示 */
        .sidebar {
            flex: 0 0 260px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            padding: 24px 16px;
            position: sticky;
            top: 20px;
            height: fit-content;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .sidebar-header {
            text-align: center;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 2px solid #eef2ff;
        }

        .sidebar-header h1 {
            font-size: 1.6rem;
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .sidebar-header p {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 6px;
        }

        .nav-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar-btn {
            background: transparent;
            border: none;
            padding: 12px 16px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 550;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #1e293b;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            min-height: 48px;
        }

        .sidebar-btn span:first-child {
            font-size: 1.2rem;
            width: 28px;
        }

        .sidebar-btn:hover {
            background: #f1f5f9;
            transform: translateX(4px);
        }

        .sidebar-btn.active {
            background: #0f172a;
            color: white;
        }

        .sidebar-btn.warning {
            color: #b45309;
        }

        .sidebar-btn.success {
            color: #166534;
        }

        .sidebar-btn.favorite {
            color: #ca8a04;
        }

        .sidebar-footer {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #eef2ff;
            font-size: 0.7rem;
            color: #94a3b8;
            text-align: center;
        }

        .main-content {
            flex: 1;
            min-width: 280px;
        }

        /* 统计卡片 - 紧凑版 */
        .stats-card {
            background: linear-gradient(125deg, #0f172a 0%, #1e293b 100%);
            border-radius: 28px;
            padding: 14px 18px;
            color: white;
            margin-bottom: 16px;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .lib-badge {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            min-height: 34px;
            display: inline-flex;
            align-items: center;
        }

        .stats-right {
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 12px;
            border-radius: 60px;
        }

        .progress-bar {
            background: #334155;
            border-radius: 60px;
            height: 5px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #60a5fa, #3b82f6);
            width: 0%;
            height: 100%;
            transition: width 0.3s;
        }

        /* 操作行 - 紧凑 */
        .action-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .action-btn {
            background: #f1f5f9;
            border: none;
            padding: 10px 16px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 42px;
        }

        .jump-input {
            width: 75px;
            padding: 10px 10px;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            text-align: center;
            font-size: 0.8rem;
            background: white;
            min-height: 42px;
        }

        .search-input {
            flex: 1;
            min-width: 140px;
            padding: 10px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            font-size: 0.8rem;
            background: white;
            min-height: 42px;
        }

        /* 题目卡片 */
        .question-card {
            background: white;
            border-radius: 32px;
            padding: 22px 20px;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            position: relative;
        }

        .favorite-star {
            position: absolute;
            top: 18px;
            right: 18px;
            font-size: 28px;
            cursor: pointer;
            background: none;
            border: none;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 40px;
            transition: background 0.2s;
        }

        .favorite-star:active {
            background: #f1f5f9;
        }

        .favorite-star.favorited {
            color: #eab308;
        }

        .favorite-star:not(.favorited) {
            color: #cbd5e1;
        }

        .question-type {
            display: inline-flex;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 5px 14px;
            border-radius: 60px;
            margin-bottom: 16px;
            min-height: 32px;
            align-items: center;
        }

        .type-choice {
            background: #dbeafe;
            color: #1e40af;
        }

        .type-choice-multi {
            background: #ede9fe;
            color: #6d28d9;
        }

        .type-fill {
            background: #dcfce7;
            color: #166534;
        }

        .question-text {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.45;
            margin-bottom: 20px;
            padding-right: 44px;
        }

        /* 选项 - 大触控区域 */
        .options-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 16px 0 10px;
        }

        .option-item {
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            background: white;
            transition: all 0.2s;
            min-height: 60px;
        }

        .option-item:active {
            background: #f8fafc;
            transform: scale(0.98);
        }

        .option-prefix {
            font-weight: 800;
            background: #f8fafc;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
            flex-shrink: 0;
        }

        .option-text {
            flex: 1;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .option-item.correct-highlight {
            border-color: #22c55e;
            background: #f0fdf4;
        }

        .option-item.wrong-highlight {
            border-color: #ef4444;
            background: #fef2f2;
        }

        .fill-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 0.95rem;
            border: 2px solid #e2e8f0;
            border-radius: 80px;
            min-height: 56px;
        }

        .feedback {
            border-radius: 20px;
            padding: 12px 16px;
            margin-top: 14px;
            font-size: 0.85rem;
        }

        .feedback-correct {
            background: #f0fdf4;
            border-left: 4px solid #22c55e;
        }

        .feedback-wrong {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
        }

        .submit-btn {
            background: #0f172a;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 12px;
            width: 100%;
            min-height: 52px;
        }

        /* 滑动提示 - 手机端显示 */
        .swipe-hint {
            text-align: center;
            font-size: 0.65rem;
            color: #64748b;
            margin-top: 12px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        /* 弹窗样式优化 */
        .panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 480px;
            background: white;
            border-radius: 40px;
            z-index: 2000;
            display: none;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .panel-header {
            background: #f8fafc;
            padding: 18px 22px;
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eef2ff;
        }

        .panel-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .panel-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
            min-height: 60px;
            gap: 12px;
        }

        .panel-item-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .panel-item-title {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .panel-item-preview {
            font-size: 0.75rem;
            color: #64748b;
            line-height: 1.3;
        }

        .panel-item-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .delete-lib-btn, .clear-wrong-btn, .unfavorite-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 40px;
            min-height: 40px;
        }

        .delete-lib-btn {
            color: #ef4444;
        }

        .clear-wrong-btn {
            color: #ef4444;
            font-size: 0.75rem;
            background: #fef2f2;
            padding: 6px 12px;
        }

        .unfavorite-btn {
            color: #eab308;
        }

        .panel-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
        }

        .panel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            z-index: 1999;
            display: none;
        }

        /* 重置统计等模态框 */
        .reset-modal,
        .stats-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .reset-card,
        .stats-card-modal {
            background: white;
            border-radius: 40px;
            width: 90%;
            max-width: 320px;
            padding: 28px 24px;
            text-align: center;
        }

        .search-result-item {
            padding: 14px 18px;
            border-bottom: 1px solid #eef2ff;
            cursor: pointer;
            background: white;
            min-height: 56px;
        }

        .empty-state {
            text-align: center;
            padding: 50px 24px;
            color: #64748b;
            background: white;
            border-radius: 32px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #3b82f6;
        }

        /* ========== 平板端专用样式 (768px-1024px) ========== */
        @media (min-width: 768px) and (max-width: 1024px) {
            body {
                padding: 20px;
            }

            .sidebar {
                position: sticky;
                left: auto;
                display: block;
                width: auto;
                flex: 0 0 240px;
                border-radius: 32px;
                top: 20px;
            }

            .main-content {
                margin: 30px 0;
            }

            .menu-toggle,
            .mobile-overlay {
                display: none !important;
            }

            .options-list {
                grid-template-columns: repeat(2, 1fr);
            }

            /* 平板端内容不靠上 */
            .app-container {
                align-items: center;
            }
        }

        /* ========== 手机端专用样式 (小于768px) ========== */
        @media (max-width: 767px) {
            body {
                padding: 12px;
            }

            /* 侧边栏隐藏，滑出菜单 */
            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                z-index: 1000;
                transition: left 0.3s ease;
                height: 100vh;
                overflow-y: auto;
                border-radius: 0 32px 32px 0;
                width: 260px;
                display: block;
            }

            .sidebar.open {
                left: 0;
            }

            /* 右下角菜单按钮 */
            .menu-toggle {
                position: fixed;
                bottom: 24px;
                right: 24px;
                background: #0f172a;
                color: white;
                border: none;
                width: 56px;
                height: 56px;
                border-radius: 28px;
                font-size: 1.8rem;
                z-index: 1001;
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            /* 遮罩层 */
            .mobile-overlay {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 999;
                display: none;
            }

            .mobile-overlay.show {
                display: block;
            }

            /* 手机端隐藏底部导航栏按钮，改用滑动 */
            .bottom-nav {
                display: none !important;
            }

            /* 手机端选项单列 */
            .options-list {
                grid-template-columns: 1fr;
            }

            .question-text {
                font-size: 0.95rem;
                padding-right: 44px;
            }

            .favorite-star {
                font-size: 26px;
                width: 44px;
                height: 44px;
                top: 14px;
                right: 14px;
            }

            .stats-card {
                padding: 12px 16px;
            }
        }

        @media (min-width: 1025px) {

            .menu-toggle,
            .mobile-overlay {
                display: none;
            }

            .bottom-nav {
                display: flex !important;
            }
        }

        /* 底部导航（电脑/平板显示） */
        .bottom-nav {
            display: flex;
            gap: 14px;
            margin-top: 8px;
        }

        .nav-btn {
            flex: 1;
            background: #f1f5f9;
            border: none;
            padding: 14px 0;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            min-height: 50px;
            font-size: 0.9rem;
        }

        .nav-btn-primary {
            background: #0f172a;
            color: white;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- 侧边栏菜单 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1><span>📚</span> 吉吉</h1>
            <p>✨ 御用刷题 · 进步可见</p>
        </div>
        <div class="nav-group">
            <button class="sidebar-btn" id="uploadBtn" aria-label="新建题库"><span>📂</span> 新建题库</button>
            <button class="sidebar-btn" id="libraryBtn" aria-label="题库列表"><span>📚</span> 题库列表</button>
            <button class="sidebar-btn" id="studyModeBtn" aria-label="刷题模式"><span>📖</span> 刷题模式</button>
            <button class="sidebar-btn" id="reciteModeBtn" aria-label="背题模式"><span>📝</span> 背题模式</button>
            <button class="sidebar-btn favorite" id="favoriteManagerBtn" aria-label="我的收藏"><span>⭐</span> 我的收藏</button>
            <button class="sidebar-btn warning" id="wrongbookManagerBtn" aria-label="错题本"><span>📕</span> 错题本</button>
            <button class="sidebar-btn success" id="randomBtn" aria-label="随机抽题"><span>🎲</span> 随机抽题</button>
            <button class="sidebar-btn" id="statsBtn" aria-label="学习统计"><span>📊</span> 学习统计</button>
            <button class="sidebar-btn" id="resetAnswersBtn" aria-label="重置答题"><span>🔄</span> 重置答题</button>
            <button class="sidebar-btn" id="backToFullBtn" style="display:none;"><span>🏠</span> 返回全部</button>
        </div>
        <div class="sidebar-footer">
            <span>👈👉 滑动切题 | ☆ 收藏 | 📕 自动记录错题</span>
        </div>
    </div>

    <!-- 手机端菜单按钮和遮罩 -->
    <button class="menu-toggle" id="menuToggle" aria-label="菜单">☰</button>
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <div class="main-content">
        <div class="stats-card">
            <div class="stats-row">
                <div class="lib-badge" id="libNameBadge" aria-label="当前题库">📚 未选择</div>
                <div class="stats-right" id="statsText" aria-label="学习进度">0 / 0 ✅0</div>
            </div>
            <div class="progress-bar" aria-label="进度条">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="action-row">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 搜索题目..." aria-label="搜索题目">
            <div style="display:flex; gap:6px;">
                <input type="number" id="jumpToInput" class="jump-input" min="1" placeholder="题号" aria-label="跳转到题号">
                <button class="action-btn" id="jumpToBtn" aria-label="跳转">跳转</button>
            </div>
        </div>
        <div id="searchResults" style="display:none; background:white; border-radius:28px; margin-bottom:16px;"></div>

        <div id="questionArea"></div>

        <div class="bottom-nav" id="bottomNav">
            <button class="nav-btn" id="prevBtn" aria-label="上一题">◀ 上一题</button>
            <button class="nav-btn nav-btn-primary" id="nextBtn" aria-label="下一题">下一题 ▶</button>
        </div>
        <div class="swipe-hint" id="swipeHint" style="display: none;">👆 左右滑动(>15px)切换题目</div>
    </div>
</div>

<div id="panelOverlay" class="panel-overlay"></div>
<div id="libraryPanel" class="panel">
    <div class="panel-header"><span>📚 我的题库</span><button class="panel-close" id="closeLibraryPanel" aria-label="关闭">✕</button></div>
    <div id="libraryList" class="panel-list"></div>
</div>
<div id="wrongbookPanel" class="panel">
    <div class="panel-header"><span>📕 错题本</span><button class="panel-close" id="closeWrongbookPanel" aria-label="关闭">✕</button></div>
    <div id="wrongbookList" class="panel-list"></div>
</div>
<div id="favoritePanel" class="panel">
    <div class="panel-header"><span>⭐ 我的收藏</span><button class="panel-close" id="closeFavoritePanel" aria-label="关闭">✕</button></div>
    <div id="favoriteList" class="panel-list"></div>
</div>

<script>
    // ---------- 数据存储 ----------
    let libraries = {};
    let currentLibId = null;
    let questions = [];
    let currentIndex = 0;
    let isReciteMode = false;
    let currentMode = 'normal';
    let fullBackup = null;
    let saveTimer = null;
    const STORAGE_KEY = 'shuati_v28_optimized';
    let pendingMultiAnswer = null;

    // DOM 元素
    const DOM = {
        libNameBadge: document.getElementById('libNameBadge'),
        statsText: document.getElementById('statsText'),
        progressFill: document.getElementById('progressFill'),
        bottomNav: document.getElementById('bottomNav'),
        swipeHint: document.getElementById('swipeHint'),
        questionArea: document.getElementById('questionArea'),
        uploadBtn: document.getElementById('uploadBtn'),
        libraryBtn: document.getElementById('libraryBtn'),
        studyModeBtn: document.getElementById('studyModeBtn'),
        reciteModeBtn: document.getElementById('reciteModeBtn'),
        favoriteManagerBtn: document.getElementById('favoriteManagerBtn'),
        wrongbookManagerBtn: document.getElementById('wrongbookManagerBtn'),
        randomBtn: document.getElementById('randomBtn'),
        statsBtn: document.getElementById('statsBtn'),
        resetAnswersBtn: document.getElementById('resetAnswersBtn'),
        jumpToInput: document.getElementById('jumpToInput'),
        jumpToBtn: document.getElementById('jumpToBtn'),
        searchInput: document.getElementById('searchInput'),
        searchResults: document.getElementById('searchResults'),
        prevBtn: document.getElementById('prevBtn'),
        nextBtn: document.getElementById('nextBtn'),
        backToFullBtn: document.getElementById('backToFullBtn'),
        menuToggle: document.getElementById('menuToggle'),
        mobileOverlay: document.getElementById('mobileOverlay'),
        sidebar: document.getElementById('sidebar'),
        panelOverlay: document.getElementById('panelOverlay')
    };

    function closeAllPanels() {
        document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
        if (DOM.panelOverlay) DOM.panelOverlay.style.display = 'none';
    }

    function openPanel(panelId) {
        closeAllPanels();
        const p = document.getElementById(panelId);
        if (p) {
            p.style.display = 'block';
            if (DOM.panelOverlay) DOM.panelOverlay.style.display = 'block';
        }
    }

    function escapeHtml(s) {
        if (!s) return '';
        return s.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    function saveAll() {
        if (currentLibId && questions.length && (currentMode === 'normal' || currentMode === 'recite')) {
            if (!libraries[currentLibId]) libraries[currentLibId] = {};
            libraries[currentLibId].questions = JSON.parse(JSON.stringify(questions));
            libraries[currentLibId].currentIndex = currentIndex;
            libraries[currentLibId].isReciteMode = isReciteMode;
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(libraries));
        localStorage.setItem('current_lib_id', currentLibId);
    }

    function debouncedSave() {
        if (saveTimer) clearTimeout(saveTimer);
        saveTimer = setTimeout(saveAll, 300);
    }

    function switchToLibrary(libId, needSave = true) {
        if (needSave && currentLibId && questions.length && (currentMode === 'normal' || currentMode === 'recite')) {
            if (!libraries[currentLibId]) libraries[currentLibId] = {};
            libraries[currentLibId].questions = JSON.parse(JSON.stringify(questions));
            libraries[currentLibId].currentIndex = currentIndex;
            libraries[currentLibId].isReciteMode = isReciteMode;
        }
        currentLibId = libId;
        const lib = libraries[libId];
        if (lib && lib.questions) {
            questions = JSON.parse(JSON.stringify(lib.questions));
            currentIndex = lib.currentIndex || 0;
            isReciteMode = lib.isReciteMode || false;
        } else {
            questions = [];
            currentIndex = 0;
            isReciteMode = false;
        }
        currentMode = 'normal';
        fullBackup = null;
        pendingMultiAnswer = null;
        renderCurrent();
        renderUI();
        debouncedSave();
    }

    function deleteLibrary(libId) {
        if (confirm('⚠️ 确定永久删除该题库吗？')) {
            if (libId === currentLibId) {
                const otherIds = Object.keys(libraries).filter(id => id !== libId);
                if (otherIds.length > 0) switchToLibrary(otherIds[0]);
                else {
                    currentLibId = null;
                    questions = [];
                    currentIndex = 0;
                    renderCurrent();
                }
            }
            delete libraries[libId];
            saveAll();
            renderUI();
            showLibraryList();
        }
    }

    // 清除错题本
    function clearWrongBook(libId) {
        if (confirm('确定清空该题库的错题本吗？')) {
            if (libraries[libId]) {
                libraries[libId].wrongBookIds = [];
                if (currentLibId === libId) {
                    // 重新加载当前题目，刷新错题标记
                    const lib = libraries[libId];
                    if (lib && lib.questions) {
                        questions = JSON.parse(JSON.stringify(lib.questions));
                        currentIndex = lib.currentIndex || 0;
                        isReciteMode = lib.isReciteMode || false;
                    }
                    renderCurrent();
                }
                saveAll();
                showWrongbookList();
            }
        }
    }

    // 取消收藏
    function removeFavorite(libId, qid) {
        if (libraries[libId]) {
            let fav = libraries[libId].favoriteIds || [];
            fav = fav.filter(id => id !== qid);
            libraries[libId].favoriteIds = fav;
            if (currentLibId === libId) {
                const q = questions.find(q => q.id === qid);
                if (q) q.isFavorited = false;
                renderCurrent();
            }
            saveAll();
            showFavoriteList();
        }
    }

    function toggleFavorite(qid) {
        if (!currentLibId) return;
        let fav = libraries[currentLibId].favoriteIds || [];
        if (fav.includes(qid)) fav = fav.filter(id => id !== qid);
        else fav.push(qid);
        libraries[currentLibId].favoriteIds = fav;
        const q = questions.find(q => q.id === qid);
        if (q) q.isFavorited = fav.includes(qid);
        renderCurrent();
        debouncedSave();
    }

    function isFavorited(qid) {
        return currentLibId && (libraries[currentLibId].favoriteIds || []).includes(qid);
    }

    function normalizeAnswer(s) {
        if (!s) return '';
        return s.toString().toLowerCase().replace(/[，,。？?、！!；;、\s]/g, '').trim();
    }

    function isFillAnswerCorrect(userAns, correctAns) {
        const normUser = normalizeAnswer(userAns);
        const normCorrect = normalizeAnswer(correctAns);
        return normUser === normCorrect;
    }

    function autoCheckAndSync() {
        if (isReciteMode) return;
        const q = questions[currentIndex];
        if (!q || !q.userAnswer) return;
        let isRight = false;
        if (q.type === 'choice') {
            isRight = (q.userAnswer === q.correctAnswer);
        } else if (q.type === 'multi') {
            const u = q.userAnswer.split('').sort().join('');
            isRight = (u === q.correctAnswer);
        } else {
            isRight = isFillAnswerCorrect(q.userAnswer, q.correctAnswer);
        }
        q.isCorrect = isRight;
        if (currentLibId) {
            let wrong = libraries[currentLibId].wrongBookIds || [];
            if (isRight) wrong = wrong.filter(id => id !== q.id);
            else if (q.userAnswer && !wrong.includes(q.id)) wrong.push(q.id);
            libraries[currentLibId].wrongBookIds = wrong;
        }
        debouncedSave();
        if (isRight && !isReciteMode) {
            setTimeout(() => {
                if (currentIndex + 1 < questions.length) {
                    currentIndex++;
                    pendingMultiAnswer = null;
                    renderCurrent();
                }
            }, 200);
        }
    }

    function renderUI() {
        if (!questions.length) {
            DOM.statsText.innerText = '0 / 0 ✅0';
            DOM.progressFill.style.width = '0%';
            DOM.libNameBadge.innerText = '📚 无题库';
            return;
        }
        const total = questions.length;
        const answered = questions.filter(q => q.userAnswer && q.userAnswer !== '').length;
        const correct = questions.filter(q => q.isCorrect === true).length;
        const accuracy = answered === 0 ? 0 : (correct / answered * 100).toFixed(0);
        DOM.statsText.innerText = `${currentIndex + 1}/${total} ✅${correct} (${accuracy}%)`;
        DOM.progressFill.style.width = `${((currentIndex) / total) * 100}%`;
        let name = libraries[currentLibId]?.name || '未命名';
        let mode = isReciteMode ? '📝背题' : (currentMode === 'random' ? '🎲随机' : (currentMode === 'wrongbook_review' ? '📕错题复习' : (currentMode === 'favorite_review' ? '⭐收藏复习' : '📖刷题')));
        DOM.libNameBadge.innerText = `${name} ${mode}`;
        DOM.backToFullBtn.style.display = (currentMode !== 'normal') ? 'flex' : 'none';
        if (DOM.jumpToInput) DOM.jumpToInput.placeholder = `1-${total}`;

        // 手机端显示滑动提示，电脑端隐藏
        const isMobile = window.innerWidth <= 767;
        if (DOM.swipeHint) {
            DOM.swipeHint.style.display = isMobile && questions.length ? 'block' : 'none';
        }
    }

    function renderCurrent() {
        if (!questions.length) {
            DOM.questionArea.innerHTML = `<div class="empty-state">📄 点击「新建题库」上传文件<br>✨ 支持单选/多选题<br>☆ 点击右上角星标收藏题目<br>📕 错题本自动记录错题</div>`;
            renderUI();
            return;
        }
        const q = questions[currentIndex];
        if (!q) return;

        let typeClass = q.type === 'choice' ? 'type-choice' : (q.type === 'multi' ? 'type-choice-multi' : 'type-fill');
        let typeText = q.type === 'choice' ? '🔘 单选题' : (q.type === 'multi' ? '☑️ 多选题' : '📝 填空题');
        const favorited = isFavorited(q.id);
        const starDisplay = favorited ? '★' : '☆';
        const starClass = favorited ? 'favorited' : '';

        if (q.type === 'choice') {
            let optsHtml = `<div class="options-list" role="radiogroup">`;
            (q.options || []).forEach(opt => {
                const isSelected = (q.userAnswer === opt.prefix);
                let addClass = '';
                if (isReciteMode) {
                    if (q.correctAnswer === opt.prefix) addClass = 'correct-highlight';
                } else {
                    if (isSelected && q.isCorrect === true) addClass = 'correct-highlight';
                    else if (isSelected && q.isCorrect === false) addClass = 'wrong-highlight';
                    else if (!isSelected && q.isCorrect === false && q.correctAnswer === opt.prefix) addClass = 'correct-highlight';
                }
                optsHtml += `<div class="option-item ${addClass}" data-val="${opt.prefix}" role="radio"><div class="option-prefix">${opt.prefix}</div><div class="option-text">${escapeHtml(opt.text)}</div></div>`;
            });
            optsHtml += `</div>`;
            let feedbackHtml = '';
            if (!isReciteMode && q.userAnswer) {
                if (q.isCorrect === true) feedbackHtml = `<div class="feedback feedback-correct">✅ 正确！</div>`;
                else if (q.isCorrect === false) feedbackHtml = `<div class="feedback feedback-wrong">❌ 错误。正确答案：${escapeHtml(q.correctAnswer)}<br>你的答案：${escapeHtml(q.userAnswer)}</div>`;
            }
            DOM.questionArea.innerHTML = `<div class="question-card"><button class="favorite-star ${starClass}" id="favoriteStarBtn" aria-label="收藏题目">${starDisplay}</button><div class="question-type ${typeClass}">${typeText}</div><div class="question-text">${escapeHtml(q.text)}</div>${optsHtml}<div id="fillFeedbackDiv">${feedbackHtml}</div></div>`;
            document.getElementById('favoriteStarBtn')?.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleFavorite(q.id);
            });
            if (!isReciteMode) {
                document.querySelectorAll('.option-item').forEach(el => {
                    el.addEventListener('click', () => {
                        q.userAnswer = el.dataset.val;
                        autoCheckAndSync();
                        renderCurrent();
                    });
                });
            }
        } else if (q.type === 'multi') {
            let currentAnswer = q.isSubmitted ? q.userAnswer : pendingMultiAnswer;
            let optsHtml = `<div class="options-list" role="group">`;
            (q.options || []).forEach(opt => {
                const isSelected = currentAnswer ? currentAnswer.includes(opt.prefix) : false;
                let addClass = '';
                if (isReciteMode && q.correctAnswer.includes(opt.prefix)) addClass = 'correct-highlight';
                else if (q.isSubmitted && isSelected) addClass = q.isCorrect === true ? 'correct-highlight' : 'wrong-highlight';
                else if (q.isSubmitted && q.isCorrect === false && q.correctAnswer.includes(opt.prefix)) addClass = 'correct-highlight';
                optsHtml += `<div class="option-item ${addClass}" data-val="${opt.prefix}" role="checkbox"><div class="option-prefix">${opt.prefix}</div><div class="option-text">${escapeHtml(opt.text)}</div></div>`;
            });
            optsHtml += `</div>`;
            let submitBtn = '', feedbackHtml = '';
            if (!isReciteMode && !q.isSubmitted) submitBtn = `<button class="submit-btn" id="submitMultiBtn" aria-label="提交答案">📝 提交本题</button>`;
            else if (!isReciteMode && q.isSubmitted) {
                if (q.isCorrect === true) feedbackHtml = `<div class="feedback feedback-correct">✅ 正确！</div>`;
                else feedbackHtml = `<div class="feedback feedback-wrong">❌ 错误。正确答案：${escapeHtml(q.correctAnswer)}<br>你的答案：${escapeHtml(q.userAnswer)}</div>`;
            }
            DOM.questionArea.innerHTML = `<div class="question-card"><button class="favorite-star ${starClass}" id="favoriteStarBtn" aria-label="收藏题目">${starDisplay}</button><div class="question-type ${typeClass}">${typeText}</div><div class="question-text">${escapeHtml(q.text)}</div>${optsHtml}${submitBtn}<div id="fillFeedbackDiv">${feedbackHtml}</div></div>`;
            document.getElementById('favoriteStarBtn')?.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleFavorite(q.id);
            });
            if (!isReciteMode && !q.isSubmitted) {
                document.querySelectorAll('.option-item').forEach(el => {
                    el.addEventListener('click', () => {
                        let val = el.dataset.val;
                        let current = pendingMultiAnswer ? pendingMultiAnswer.split('') : [];
                        if (current.includes(val)) current = current.filter(v => v !== val);
                        else current.push(val);
                        pendingMultiAnswer = current.sort().join('');
                        renderCurrent();
                    });
                });
                document.getElementById('submitMultiBtn')?.addEventListener('click', () => {
                    if (pendingMultiAnswer) {
                        q.userAnswer = pendingMultiAnswer;
                        q.isSubmitted = true;
                        autoCheckAndSync();
                        renderCurrent();
                    } else alert('请至少选择一个选项');
                });
            }
        } else {
            if (isReciteMode) {
                DOM.questionArea.innerHTML = `<div class="question-card"><button class="favorite-star ${starClass}" id="favoriteStarBtn" aria-label="收藏题目">${starDisplay}</button><div class="question-type ${typeClass}">${typeText}</div><div class="question-text">${escapeHtml(q.text)}</div><div class="fill-area"><input type="text" class="fill-input recite-input" placeholder="背题模式" readonly disabled></div><div class="recite-answer" style="margin-top:16px;padding:12px;background:#f8fafc;border-radius:20px;">📖 参考答案：${escapeHtml(q.correctAnswer)}</div></div>`;
                document.getElementById('favoriteStarBtn')?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleFavorite(q.id);
                });
            } else {
                let inputHtml = `<input type="text" class="fill-input" id="fillInput" placeholder="输入答案..." value="${escapeHtml(q.userAnswer || '')}" autocomplete="off" aria-label="填空题答案">`;
                let fbHtml = q.userAnswer ? (q.isCorrect === true ? `<div class="feedback feedback-correct">✅ 正确！</div>` : (q.isCorrect === false ? `<div class="feedback feedback-wrong">❌ 错误。正确答案：${escapeHtml(q.correctAnswer)}</div>` : ``)) : ``;
                DOM.questionArea.innerHTML = `<div class="question-card"><button class="favorite-star ${starClass}" id="favoriteStarBtn" aria-label="收藏题目">${starDisplay}</button><div class="question-type ${typeClass}">${typeText}</div><div class="question-text">${escapeHtml(q.text)}</div><div class="fill-area">${inputHtml}</div><div id="fillFeedbackDiv">${fbHtml}</div></div>`;
                document.getElementById('favoriteStarBtn')?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleFavorite(q.id);
                });
                const inp = document.getElementById('fillInput');
                if (inp) {
                    const handler = () => {
                        q.userAnswer = inp.value.trim();
                        autoCheckAndSync();
                        renderCurrent();
                    };
                    inp.addEventListener('input', handler);
                    inp.addEventListener('blur', handler);
                }
            }
        }
        renderUI();
        debouncedSave();
    }

    function parseQuestionsFromText(content) {
        const lines = content.split(/\r?\n/);
        const list = [];
        let cur = null;
        let qid = 1;
        for (let line of lines) {
            line = line.trim();
            if (!line) continue;
            const num = line.match(/^(\d+)[\.、\)）]\s*(.*)/);
            if (num) {
                if (cur) finalize(cur, list, qid++);
                let raw = num[2];
                let answer = null;
                let ansM = raw.match(/(?:答案|正确答案)[：:]\s*([A-Z]+)/i);
                if (ansM) {
                    answer = ansM[1].toUpperCase().split('');
                    raw = raw.replace(/(?:答案|正确答案)[：:]\s*[A-Z]+/i, '').trim();
                }
                let options = [];
                const optR = /([A-D])[\.、）)\s]\s*([^A-D]*?)(?=\s*[A-D][\.、）)\s]|\s*$)/gi;
                let m;
                while ((m = optR.exec(raw)) !== null) {
                    let txt = m[2].trim();
                    if (txt) options.push({ prefix: m[1].toUpperCase(), text: txt });
                }
                let clean = raw;
                for (let opt of options) {
                    let re = new RegExp(`${opt.prefix}[\.、）)\s]\\s*${opt.text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}`, 'i');
                    clean = clean.replace(re, '');
                }
                clean = clean.replace(/\s+/g, ' ').trim();
                const isFill = clean.includes('______') || clean.includes('___');
                const isMulti = answer && answer.length > 1;
                cur = { text: clean, options, answer, type: isFill ? 'fill' : (isMulti ? 'multi' : 'choice') };
            } else if (cur) {
                let ansM = line.match(/(?:答案|正确答案)[：:]\s*([A-Z]+)/i);
                if (ansM && !cur.answer) {
                    cur.answer = ansM[1].toUpperCase().split('');
                    continue;
                }
                let optM = line.match(/^([A-D])[\.、）)\s]\s*(.*)/);
                if (optM && cur.type !== 'fill') {
                    cur.options.push({ prefix: optM[1].toUpperCase(), text: optM[2].trim() });
                    continue;
                }
                if (!line.match(/^[A-D][\.、）)\s]/i) && !line.match(/答案[：:]/i)) cur.text += ' ' + line;
            }
        }
        if (cur) finalize(cur, list, qid);
        return list;

        function finalize(q, arr, id) {
            let text = q.text.replace(/\s+/g, ' ').trim();
            if (q.type === 'fill') arr.push({ id, type: 'fill', text, options: [], correctAnswer: q.answer ? q.answer.join('') : '?', userAnswer: '', isCorrect: undefined, isSubmitted: false });
            else if (q.type === 'multi') arr.push({ id, type: 'multi', text, options: q.options, correctAnswer: q.answer ? q.answer.sort().join('') : '', userAnswer: '', isCorrect: undefined, isSubmitted: false });
            else arr.push({ id, type: 'choice', text, options: q.options, correctAnswer: q.answer ? q.answer[0] : '?', userAnswer: '', isCorrect: undefined, isSubmitted: false });
        }
    }

    async function createNewLibrary(file) {
        if (!file) return;
        DOM.questionArea.innerHTML = `<div class="loading">⏳ 解析文件中...</div>`;
        try {
            let text = '';
            if (file.name.endsWith('.docx')) {
                if (!window.mammoth) throw new Error('解析库未加载');
                const buf = await file.arrayBuffer();
                const res = await mammoth.extractRawText({ arrayBuffer: buf });
                text = res.value;
            } else text = await file.text();
            const parsed = parseQuestionsFromText(text);
            if (!parsed.length) throw new Error('未识别题目');
            const libId = Date.now().toString();
            const libName = file.name.replace(/\.(txt|docx)$/i, '').slice(0, 30);
            libraries[libId] = { name: libName, questions: parsed, currentIndex: 0, isReciteMode: false, wrongBookIds: [], favoriteIds: [] };
            saveAll();
            switchToLibrary(libId);
            renderUI();
            alert(`✅ 创建成功，共 ${parsed.length} 题`);
        } catch (err) {
            alert('解析失败: ' + err.message);
            renderCurrent();
        }
    }

    function showLibraryList() {
        const c = document.getElementById('libraryList');
        c.innerHTML = '';
        for (let id in libraries) {
            const name = libraries[id].name || '未命名';
            const div = document.createElement('div');
            div.className = 'panel-item';
            div.innerHTML = `
                <div class="panel-item-left">
                    <div class="panel-item-title">📚 ${escapeHtml(name)}</div>
                    <div class="panel-item-preview">${libraries[id].questions?.length || 0}题</div>
                </div>
                <div class="panel-item-actions">
                    <button class="delete-lib-btn" data-id="${id}" aria-label="删除">🗑️</button>
                </div>
            `;
            div.querySelector('.panel-item-left').onclick = () => {
                switchToLibrary(id);
                closeAllPanels();
            };
            div.querySelector('.delete-lib-btn').onclick = (e) => {
                e.stopPropagation();
                deleteLibrary(id);
            };
            c.appendChild(div);
        }
        openPanel('libraryPanel');
    }

    function showWrongbookList() {
        const c = document.getElementById('wrongbookList');
        c.innerHTML = '';
        for (let id in libraries) {
            const lib = libraries[id];
            const wrongIds = lib.wrongBookIds || [];
            const wrongQs = lib.questions?.filter(q => wrongIds.includes(q.id)) || [];
            const count = wrongQs.length;
            const div = document.createElement('div');
            div.className = 'panel-item';
            div.innerHTML = `
                <div class="panel-item-left">
                    <div class="panel-item-title">📕 ${escapeHtml(lib.name)} (${count}题)</div>
                    <div class="panel-item-preview">${count > 0 ? wrongQs[0]?.text?.substring(0, 40) + '...' : '暂无错题'}</div>
                </div>
                <div class="panel-item-actions">
                    ${count > 0 ? `<button class="clear-wrong-btn" data-id="${id}" aria-label="清空错题">清空</button>` : ''}
                </div>
            `;
            div.querySelector('.panel-item-left').onclick = () => {
                if (!count) {
                    alert('暂无错题');
                    return;
                }
                if (currentLibId !== id) switchToLibrary(id);
                fullBackup = { libId: currentLibId, questions: JSON.parse(JSON.stringify(questions)), index: currentIndex, mode: currentMode, recite: isReciteMode };
                questions = JSON.parse(JSON.stringify(wrongQs));
                currentIndex = 0;
                currentMode = 'wrongbook_review';
                isReciteMode = false;
                renderCurrent();
                renderUI();
                closeAllPanels();
            };
            const clearBtn = div.querySelector('.clear-wrong-btn');
            if (clearBtn) {
                clearBtn.onclick = (e) => {
                    e.stopPropagation();
                    clearWrongBook(id);
                };
            }
            c.appendChild(div);
        }
        openPanel('wrongbookPanel');
    }

    function showFavoriteList() {
        const c = document.getElementById('favoriteList');
        c.innerHTML = '';
        for (let id in libraries) {
            const lib = libraries[id];
            const favIds = lib.favoriteIds || [];
            const favQs = lib.questions?.filter(q => favIds.includes(q.id)) || [];
            const count = favQs.length;
            const div = document.createElement('div');
            div.className = 'panel-item';
            div.innerHTML = `
                <div class="panel-item-left">
                    <div class="panel-item-title">⭐ ${escapeHtml(lib.name)} (${count}题)</div>
                    <div class="panel-item-preview">${count > 0 ? favQs[0]?.text?.substring(0, 40) + '...' : '暂无收藏'}</div>
                </div>
                <div class="panel-item-actions">
                    ${count > 0 ? `<button class="unfavorite-btn" data-id="${id}" aria-label="清空收藏">清空</button>` : ''}
                </div>
            `;
            div.querySelector('.panel-item-left').onclick = () => {
                if (!count) {
                    alert('暂无收藏');
                    return;
                }
                if (currentLibId !== id) switchToLibrary(id);
                fullBackup = { libId: currentLibId, questions: JSON.parse(JSON.stringify(questions)), index: currentIndex, mode: currentMode, recite: isReciteMode };
                questions = JSON.parse(JSON.stringify(favQs));
                currentIndex = 0;
                currentMode = 'favorite_review';
                isReciteMode = false;
                renderCurrent();
                renderUI();
                closeAllPanels();
            };
            const clearBtn = div.querySelector('.unfavorite-btn');
            if (clearBtn) {
                clearBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (confirm('确定清空该题库的所有收藏吗？')) {
                        libraries[id].favoriteIds = [];
                        if (currentLibId === id) {
                            const qs = libraries[id].questions;
                            if (qs) qs.forEach(q => q.isFavorited = false);
                            renderCurrent();
                        }
                        saveAll();
                        showFavoriteList();
                    }
                };
            }
            c.appendChild(div);
        }
        openPanel('favoritePanel');
    }

    function backToFull() {
        if (fullBackup) {
            if (fullBackup.libId !== undefined) {
                const lib = libraries[fullBackup.libId];
                if (lib && lib.questions) {
                    questions = JSON.parse(JSON.stringify(lib.questions));
                    currentIndex = fullBackup.index || 0;
                    currentMode = fullBackup.mode || 'normal';
                    isReciteMode = fullBackup.recite || false;
                }
            } else {
                questions = fullBackup;
                currentMode = 'normal';
                isReciteMode = false;
            }
            fullBackup = null;
            renderCurrent();
            renderUI();
            debouncedSave();
        }
    }

    function setStudyMode() {
        if ((currentMode === 'random' || currentMode === 'wrongbook_review' || currentMode === 'favorite_review') && fullBackup) backToFull();
        else {
            isReciteMode = false;
            renderCurrent();
        }
    }

    function setReciteMode() {
        isReciteMode = true;
        renderCurrent();
    }

    function startRandom() {
        if (!questions.length) {
            alert('请先选择题库');
            return;
        }
        let cnt = parseInt(prompt('随机抽题数量:', 10));
        if (isNaN(cnt)) cnt = 10;
        if (cnt > questions.length) cnt = questions.length;
        const shuffled = [...questions];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        fullBackup = { libId: currentLibId, questions: JSON.parse(JSON.stringify(questions)), index: currentIndex, mode: currentMode, recite: isReciteMode };
        questions = shuffled.slice(0, cnt);
        currentIndex = 0;
        currentMode = 'random';
        isReciteMode = false;
        renderCurrent();
        renderUI();
        debouncedSave();
    }

    function showStatsModal() {
        if (!questions.length) {
            alert('暂无题目');
            return;
        }
        const total = questions.length;
        const answered = questions.filter(q => q.userAnswer && q.userAnswer !== '').length;
        const correct = questions.filter(q => q.isCorrect === true).length;
        const wrong = questions.filter(q => q.isCorrect === false).length;
        const accuracy = answered === 0 ? 0 : (correct / answered * 100).toFixed(1);
        const modalHtml = `<div class="stats-modal" id="statsModal"><div class="stats-card-modal"><h3>📊 学习统计</h3><div class="stats-row-modal"><span>总题数</span><span>${total}</span></div><div class="stats-row-modal"><span>正确</span><span style="color:#22c55e;">${correct}</span></div><div class="stats-row-modal"><span>错误</span><span style="color:#ef4444;">${wrong}</span></div><div class="stats-row-modal"><span>正确率</span><span>${accuracy}%</span></div><button class="close-stats-btn" id="closeStatsBtn" aria-label="关闭">知道了</button></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('closeStatsBtn')?.addEventListener('click', () => document.getElementById('statsModal')?.remove());
    }

    function showResetModal() {
        if (!questions.length) {
            alert('无题目');
            return;
        }
        const modalHtml = `<div class="reset-modal" id="resetModal"><div class="reset-card"><h3>🔄 重置答题</h3><div class="reset-option"><input type="radio" name="resetOption" value="answers" checked id="resetAnswers"><label for="resetAnswers">仅清空答题记录</label></div><div class="reset-option"><input type="radio" name="resetOption" value="full" id="resetFull"><label for="resetFull">清空记录+回到第1题</label></div><button class="reset-confirm-btn" id="confirmResetBtn" aria-label="确认重置">确认重置</button></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('confirmResetBtn')?.addEventListener('click', () => {
            const option = document.querySelector('input[name="resetOption"]:checked')?.value;
            for (let q of questions) {
                q.userAnswer = '';
                q.isCorrect = undefined;
                q.isSubmitted = false;
            }
            if (option === 'full') currentIndex = 0;
            if (currentLibId && libraries[currentLibId]) {
                libraries[currentLibId].questions = JSON.parse(JSON.stringify(questions));
                libraries[currentLibId].currentIndex = currentIndex;
            }
            renderCurrent();
            saveAll();
            document.getElementById('resetModal')?.remove();
            alert('重置完成');
        });
        document.getElementById('resetModal')?.addEventListener('click', (e) => {
            if (e.target === document.getElementById('resetModal')) document.getElementById('resetModal')?.remove();
        });
    }

    function jumpToQuestion() {
        if (!questions.length) return;
        let target = parseInt(DOM.jumpToInput?.value);
        if (isNaN(target)) target = 1;
        target = Math.min(Math.max(1, target), questions.length);
        currentIndex = target - 1;
        pendingMultiAnswer = null;
        renderCurrent();
        if (DOM.jumpToInput) DOM.jumpToInput.value = '';
    }

    function searchQuestions() {
        const keyword = DOM.searchInput?.value.trim().toLowerCase();
        if (!keyword || !questions.length) {
            DOM.searchResults.style.display = 'none';
            return;
        }
        const results = [];
        questions.forEach((q, idx) => {
            if (q.text.toLowerCase().includes(keyword)) results.push({ index: idx, text: q.text.substring(0, 80) });
        });
        if (results.length === 0) {
            DOM.searchResults.style.display = 'none';
            return;
        }
        DOM.searchResults.style.display = 'block';
        DOM.searchResults.innerHTML = results.map(r => `<div class="search-result-item" data-index="${r.index}" role="button">📄 ${escapeHtml(r.text)}...</div>`).join('');
        document.querySelectorAll('.search-result-item').forEach(el => {
            el.addEventListener('click', () => {
                currentIndex = parseInt(el.dataset.index);
                pendingMultiAnswer = null;
                renderCurrent();
                DOM.searchResults.style.display = 'none';
                DOM.searchInput.value = '';
            });
        });
    }

    function next() {
        if (currentIndex + 1 < questions.length) {
            currentIndex++;
            pendingMultiAnswer = null;
            renderCurrent();
        } else alert('🎉 已经是最后一题啦');
    }

    function prev() {
        if (currentIndex > 0) {
            currentIndex--;
            pendingMultiAnswer = null;
            renderCurrent();
        } else alert('已经是第一题');
    }

    function loadAll() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) try { libraries = JSON.parse(raw); } catch (e) { libraries = {}; }
        for (let id in libraries) {
            if (!libraries[id].favoriteIds) libraries[id].favoriteIds = [];
            if (!libraries[id].wrongBookIds) libraries[id].wrongBookIds = [];
        }
        const last = localStorage.getItem('current_lib_id');
        if (last && libraries[last]) switchToLibrary(last, false);
        else if (Object.keys(libraries).length) switchToLibrary(Object.keys(libraries)[0], false);
        else {
            questions = [];
            currentLibId = null;
            renderCurrent();
        }
        renderUI();
    }

    // 事件绑定
    const uploadHandler = () => {
        const inp = document.createElement('input');
        inp.type = 'file';
        inp.accept = '.txt,.docx';
        inp.onchange = e => { if (e.target.files[0]) createNewLibrary(e.target.files[0]); };
        inp.click();
    };
    DOM.uploadBtn.onclick = uploadHandler;
    DOM.libraryBtn.onclick = showLibraryList;
    DOM.studyModeBtn.onclick = setStudyMode;
    DOM.reciteModeBtn.onclick = setReciteMode;
    DOM.wrongbookManagerBtn.onclick = showWrongbookList;
    DOM.favoriteManagerBtn.onclick = showFavoriteList;
    DOM.randomBtn.onclick = startRandom;
    DOM.statsBtn.onclick = showStatsModal;
    DOM.resetAnswersBtn.onclick = showResetModal;
    DOM.jumpToBtn.onclick = jumpToQuestion;
    DOM.prevBtn.onclick = prev;
    DOM.nextBtn.onclick = next;
    DOM.backToFullBtn.onclick = backToFull;
    DOM.searchInput.addEventListener('input', searchQuestions);
    document.getElementById('closeLibraryPanel')?.addEventListener('click', closeAllPanels);
    document.getElementById('closeWrongbookPanel')?.addEventListener('click', closeAllPanels);
    document.getElementById('closeFavoritePanel')?.addEventListener('click', closeAllPanels);
    if (DOM.panelOverlay) DOM.panelOverlay.addEventListener('click', closeAllPanels);

    // 手机菜单
    if (DOM.menuToggle) {
        DOM.menuToggle.onclick = () => {
            DOM.sidebar.classList.add('open');
            DOM.mobileOverlay.classList.add('show');
        };
        DOM.mobileOverlay.onclick = () => {
            DOM.sidebar.classList.remove('open');
            DOM.mobileOverlay.classList.remove('show');
        };
    }

    // 滑动切题
    let touchStartX = 0, touchMoved = false;
    const swipeArea = document.getElementById('questionArea');
    if (swipeArea) {
        swipeArea.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].clientX; touchMoved = false; });
        swipeArea.addEventListener('touchmove', e => { if (Math.abs(e.changedTouches[0].clientX - touchStartX) > 10) touchMoved = true; });
        swipeArea.addEventListener('touchend', e => {
            if (!touchMoved) return;
            const delta = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(delta) > 15) delta > 0 ? prev() : next();
            touchStartX = 0;
            touchMoved = false;
        });
    }

    // 监听窗口大小变化，调整滑动提示显示
    window.addEventListener('resize', () => {
        const isMobile = window.innerWidth <= 767;
        if (DOM.swipeHint && questions.length) {
            DOM.swipeHint.style.display = isMobile ? 'block' : 'none';
        }
    });

    loadAll();
</script>
</body>
</html>
