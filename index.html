<script>
    // ==================== 初始化、AI配置、缓存（与前版相同，略作保留）====================
    if (typeof pdfjsLib !== 'undefined') {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    }
    let libraries = {}, currentLibId = null, questions = [], currentIndex = 0, isReciteMode = false, currentMode = 'normal', fullBackup = null, saveTimer = null, pendingMultiAnswer = null;
    const STORAGE_KEY = 'shuati_v29'; let aiModelConfig = { apiKey: '', baseUrl: '', modelName: '' };
    function loadAiConfig() { try { let cfg = JSON.parse(localStorage.getItem('ai_model_config') || '{}'); aiModelConfig = { apiKey: cfg.apiKey || '', baseUrl: cfg.baseUrl || '', modelName: cfg.modelName || '' }; } catch(e){} if(!aiModelConfig.apiKey && localStorage.getItem('aliyun_api_key')){ aiModelConfig.apiKey = localStorage.getItem('aliyun_api_key'); aiModelConfig.baseUrl = 'https://dashscope.aliyuncs.com/compatible-mode/v1'; aiModelConfig.modelName = 'qwen-turbo'; saveAiConfig(); localStorage.removeItem('aliyun_api_key'); } updateAiStatusUI(); }
    function saveAiConfig() { localStorage.setItem('ai_model_config', JSON.stringify(aiModelConfig)); updateAiStatusUI(); }
    function updateAiStatusUI() { let d=document.getElementById('aiStatus'); if(d) d.innerHTML = aiModelConfig.apiKey ? `✅ 已配置 ${aiModelConfig.modelName || '模型'}` : '⚙️ 未配置AI，请填写API Key并保存'; }
    loadAiConfig();
    document.getElementById('aiConfigBtn')?.addEventListener('click',()=>document.getElementById('aiConfigPanel')?.classList.toggle('open'));
    document.getElementById('saveModelConfigBtn')?.addEventListener('click',()=>{ let preset = document.getElementById('modelPreset').value; let customUrl = document.getElementById('customBaseUrl').value.trim(); let customModel = document.getElementById('customModelName').value.trim(); let apiKey = document.getElementById('modelApiKey').value.trim(); if(!apiKey){ alert('请输入 API Key'); return; } if(preset === 'custom'){ if(!customUrl || !customModel){ alert('自定义模式需要填写 Base URL 和模型名称'); return; } aiModelConfig.baseUrl = customUrl; aiModelConfig.modelName = customModel; }else{ if(preset === 'qwen'){ aiModelConfig.baseUrl = 'https://dashscope.aliyuncs.com/compatible-mode/v1'; aiModelConfig.modelName = 'qwen-turbo'; }else if(preset === 'zhipu'){ aiModelConfig.baseUrl = 'https://open.bigmodel.cn/api/paas/v4/'; aiModelConfig.modelName = 'glm-4-flash'; }else if(preset === 'deepseek'){ aiModelConfig.baseUrl = 'https://api.deepseek.com/v1'; aiModelConfig.modelName = 'deepseek-chat'; } } aiModelConfig.apiKey = apiKey; saveAiConfig(); document.getElementById('modelApiKey').value = ''; document.getElementById('aiConfigPanel')?.classList.remove('open'); alert(`✅ 已保存配置，模型: ${aiModelConfig.modelName}`); renderCurrent(); });
    document.getElementById('deleteModelKeyBtn')?.addEventListener('click',()=>{ if(confirm('清空AI配置？')){ aiModelConfig = { apiKey: '', baseUrl: '', modelName: '' }; saveAiConfig(); updateAiStatusUI(); alert('已清空'); renderCurrent(); } });
    const AI_CACHE_KEY = 'ai_explanation_cache_v2';
    function getAiCache(){ try{ return JSON.parse(localStorage.getItem(AI_CACHE_KEY)||'{}'); }catch(e){ return {}; } }
    function setAiCache(hash,exp){ let c=getAiCache(); c[hash]=exp; localStorage.setItem(AI_CACHE_KEY,JSON.stringify(c)); }
    function getAiCacheItem(hash){ return getAiCache()[hash]||null; }

    function parseQuestionsFromText(content) {
        const lines = content.split(/\r?\n/);
        let list = [];
        let cur = null;
        let qid = 1;
        // 匹配题目开始：数字序号 或 以“单选题”、“多选题”、“填空题”、“判断题”开头
        const isQuestionStart = (line) => {
            if (/^\s*\d+[\.、）)\s]/.test(line)) return true;
            if (/^\s*(单选题|多选题|填空题|判断题)\s*/.test(line)) return true;
            return false;
        };
        for (let line of lines) {
            line = line.trim();
            if (!line) continue;
            if (isQuestionStart(line)) {
                // 完成上一题
                if (cur) {
                    let text = cur.text.replace(/\s+/g, ' ').trim();
                    let hasOptions = cur.options && cur.options.length >= 2;
                    let isFill = false;
                    if (!hasOptions) {
                        // 没有识别出选项时才根据下划线判断填空
                        isFill = text.includes('______') || text.includes('___');
                    }
                    let isMulti = cur.answer && cur.answer.length > 1;
                    let type = 'choice';
                    if (hasOptions && isMulti) type = 'multi';
                    else if (isFill) type = 'fill';
                    else if (!hasOptions) type = 'fill';
                    if (type === 'fill') {
                        list.push({ id: qid++, type: 'fill', text, options: [], correctAnswer: cur.answer ? cur.answer.join('') : '?', userAnswer: '', isCorrect: undefined, isSubmitted: false, matchMode: 'loose', note: '' });
                    } else if (type === 'multi') {
                        list.push({ id: qid++, type: 'multi', text, options: cur.options, correctAnswer: cur.answer ? cur.answer.sort().join('') : '', userAnswer: '', isCorrect: undefined, isSubmitted: false, note: '' });
                    } else {
                        list.push({ id: qid++, type: 'choice', text, options: cur.options, correctAnswer: cur.answer ? cur.answer[0] : '?', userAnswer: '', isCorrect: undefined, isSubmitted: false, note: '' });
                    }
                }
                // 开始新题目
                let raw = line;
                // 提取答案（可能在本行或后续行，但先尝试本行）
                let answer = null;
                let ansMatch = raw.match(/(?:答案|正确答案)[：:]\s*([A-Z]+)/i);
                if (ansMatch) {
                    answer = ansMatch[1].toUpperCase().split('');
                    raw = raw.replace(/(?:答案|正确答案)[：:]\s*[A-Z]+/i, '').trim();
                }
                // 提取选项（支持内联格式如 "A. AGV B. 跨运车 C. ..."）
                let options = [];
                // 增强正则：匹配 A. 内容（直到下一个选项标识或行尾），忽略选项内容中的大写字母干扰
                let optRegex = /([A-D])[\.、）)\s]\s*([\s\S]*?)(?=\s*[A-D][\.、）)\s]|\s*$)/gi;
                let m;
                while ((m = optRegex.exec(raw)) !== null) {
                    let txt = m[2].trim();
                    if (txt) options.push({ prefix: m[1].toUpperCase(), text: txt });
                }
                // 如果当前行没有提取到选项，可能会在后续行，保留 cur 等待后续行补充
                let clean = raw;
                for (let opt of options) {
                    let re = new RegExp(opt.prefix + '[\.、）)\\s]\\s*' + opt.text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i');
                    clean = clean.replace(re, '');
                }
                clean = clean.replace(/\s+/g, ' ').trim();
                cur = { text: clean, options, answer, type: null };
            } else if (cur) {
                // 当前题目尚未结束，可能是选项行或答案行
                let ansMatchLine = line.match(/(?:答案|正确答案)[：:]\s*([A-Z]+)/i);
                if (ansMatchLine && !cur.answer) {
                    cur.answer = ansMatchLine[1].toUpperCase().split('');
                } else {
                    let optMatch = line.match(/^([A-D])[\.、）)\s]\s*(.*)/);
                    if (optMatch) {
                        cur.options.push({ prefix: optMatch[1].toUpperCase(), text: optMatch[2].trim() });
                    } else if (line.match(/^[A-D][\.、）)\s]/)) {
                        // 若匹配失败但明显是选项行，再尝试宽松提取
                        let parts = line.split(/\s+/);
                        for (let p of parts) {
                            let mm = p.match(/^([A-D])[\.、）)\s]?(.*)/);
                            if (mm) cur.options.push({ prefix: mm[1].toUpperCase(), text: mm[2].trim() });
                        }
                    }
                }
            }
        }
        // 最后一题
        if (cur) {
            let text = cur.text.replace(/\s+/g, ' ').trim();
            let hasOptions = cur.options && cur.options.length >= 2;
            let isFill = false;
            if (!hasOptions) {
                isFill = text.includes('______') || text.includes('___');
            }
            let isMulti = cur.answer && cur.answer.length > 1;
            let type = 'choice';
            if (hasOptions && isMulti) type = 'multi';
            else if (isFill) type = 'fill';
            else if (!hasOptions) type = 'fill';
            if (type === 'fill') {
                list.push({ id: qid++, type: 'fill', text, options: [], correctAnswer: cur.answer ? cur.answer.join('') : '?', userAnswer: '', isCorrect: undefined, isSubmitted: false, matchMode: 'loose', note: '' });
            } else if (type === 'multi') {
                list.push({ id: qid++, type: 'multi', text, options: cur.options, correctAnswer: cur.answer ? cur.answer.sort().join('') : '', userAnswer: '', isCorrect: undefined, isSubmitted: false, note: '' });
            } else {
                list.push({ id: qid++, type: 'choice', text, options: cur.options, correctAnswer: cur.answer ? cur.answer[0] : '?', userAnswer: '', isCorrect: undefined, isSubmitted: false, note: '' });
            }
        }
        return list;
    }
    async function parsePdfText(arrayBuffer) {
        const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
        const pdf = await loadingTask.promise;
        let fullText = '';
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            const pageText = textContent.items.map(item => item.str).join(' ');
            fullText += pageText + '\n';
        }
        return fullText;
    }
    async function createNewLibrary(file){ if(!file) return; let ext=file.name.split('.').pop().toLowerCase(); DOM.questionArea.innerHTML=`<div class="loading">⏳ 解析文件中 (支持PDF/TXT/DOCX)...</div>`; try{ let text=''; if(ext==='docx'){ if(!window.mammoth) throw new Error('解析库未加载'); let buf=await file.arrayBuffer(); let res=await mammoth.extractRawText({ arrayBuffer:buf }); text=res.value; }else if(ext==='pdf'){ if(!window.pdfjsLib) throw new Error('PDF解析库未加载'); let buf=await file.arrayBuffer(); text=await parsePdfText(buf); }else{ text=await file.text(); } let parsed=parseQuestionsFromText(text); if(!parsed.length) throw new Error('未识别题目，请确保文本包含题目编号或“单选题”等标记'); let libId=Date.now().toString(); let libName=file.name.replace(/\.(txt|docx|pdf)$/i,'').slice(0,30); libraries[libId]={ name:libName, questions:parsed, currentIndex:0, isReciteMode:false, wrongBookIds:[], favoriteIds:[] }; saveAll(); switchToLibrary(libId); renderUI(); alert(`✅ 创建成功！共 ${parsed.length} 道题目`); }catch(err){ alert('解析失败: '+err.message); renderCurrent(); } }
    function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    // 绑定UI事件
    document.getElementById('uploadBtn').onclick=()=>{ let inp=document.createElement('input'); inp.type='file'; inp.accept='.txt,.docx,.pdf'; inp.onchange=e=>{ if(e.target.files[0]) createNewLibrary(e.target.files[0]); }; inp.click(); };
    document.getElementById('libraryBtn').onclick=showLibraryList; document.getElementById('studyModeBtn').onclick=setStudyMode; document.getElementById('reciteModeBtn').onclick=setReciteMode; document.getElementById('wrongbookManagerBtn').onclick=showWrongbookList; document.getElementById('favoriteManagerBtn').onclick=showFavoriteList; document.getElementById('randomBtn').onclick=startRandom; document.getElementById('statsBtn').onclick=showStats; document.getElementById('resetAnswersBtn').onclick=showResetModal; document.getElementById('jumpToBtn').onclick=jumpToQuestion; document.getElementById('prevBtn').onclick=prev; document.getElementById('nextBtn').onclick=next; document.getElementById('backToFullBtn').onclick=backToFull; document.getElementById('closeLibraryPanel')?.addEventListener('click',closeAllPanels); document.getElementById('closeWrongbookPanel')?.addEventListener('click',closeAllPanels); document.getElementById('closeFavoritePanel')?.addEventListener('click',closeAllPanels); document.getElementById('panelOverlay').addEventListener('click',closeAllPanels);
    document.getElementById('menuToggle').onclick = () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('mobileOverlay').style.display = 'block'; };
    document.getElementById('mobileOverlay').onclick = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('mobileOverlay').style.display = 'none'; };
    document.getElementById('closeSidebarBtn')?.addEventListener('click', () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('mobileOverlay').style.display = 'none'; });
    DOM.searchInput.addEventListener('input',()=>{ let kw=DOM.searchInput.value.trim().toLowerCase(); if(!kw||!questions.length){ DOM.searchResults.style.display='none'; return; } let results=questions.filter((q,i)=>q.text.toLowerCase().includes(kw)).map((q,i)=>({idx:i,text:q.text.substring(0,80)})); if(!results.length){ DOM.searchResults.style.display='none'; return; } DOM.searchResults.style.display='block'; DOM.searchResults.innerHTML=results.map(r=>`<div class="search-result-item" data-idx="${r.idx}">📄 ${escapeHtml(r.text)}...</div>`).join(''); });
    DOM.searchResults.addEventListener('click',(e)=>{ let target=e.target.closest('.search-result-item'); if(target && target.dataset.idx){ let idx=parseInt(target.dataset.idx); if(!isNaN(idx) && idx>=0 && idx<questions.length){ currentIndex=idx; pendingMultiAnswer=null; renderCurrent(); DOM.searchResults.style.display='none'; DOM.searchInput.value=''; } } });
    let touchStartX=0; document.getElementById('questionArea')?.addEventListener('touchstart',e=>{ touchStartX=e.changedTouches[0].clientX; }); document.getElementById('questionArea')?.addEventListener('touchend',e=>{ let delta=e.changedTouches[0].clientX-touchStartX; if(Math.abs(delta)>20) delta>0?prev():next(); });
    loadAll();
